<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Our Story — WAVE3 Collective</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    .story-body { max-width: 720px; margin-top: 26px; }
    .story-body p { color: var(--muted); font-size: 16.5px; line-height: 1.75; margin-bottom: 18px; }
    .story-body p:first-of-type { color: var(--text); font-size: 18px; }
  </style>
</head>
<body>
  <main class="container" style="min-height: 55vh; padding-bottom: 30px;">
    <div class="mt-4">
      <p class="eyebrow">Wave 3 Collective</p>
      <h1 style="font-size: clamp(36px, 6vw, 64px); margin-top: 8px;">Our <span style="color:var(--blue-bright);">Story</span></h1>
    </div>
    <div class="story-body" id="story-body">
      <p class="muted">Loading…</p>
    </div>
    <div class="mt-3">
      <a class="btn btn-primary" href="/shop">Shop now <span aria-hidden="true">&#8594;</span></a>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="/js/nav.js"></script>
  <script>
    W3.data.then((shop) => {
      const el = document.getElementById("story-body");
      const text = (shop.settings.story || "").trim();
      if (!text) {
        el.innerHTML = '<p class="muted">Our story is being written. Check back soon — the movement continues.</p>';
        return;
      }
      el.innerHTML = text
        .split(/\n\s*\n/)
        .map((p) => `<p>${W3.esc(p).replace(/\n/g, "<br/>")}</p>`)
        .join("");
    });
  </script>
</body>
</html>
